<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Assinatura Médica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🩺 Gerador de Assinatura Médica</h1>
        <div class="info-box">
            💡 <strong>Novidade:</strong> Agora com remoção automática de fundo! 🎉
        </div>
        
        <div class="upload-section">
            <div class="file-input-wrapper">
                <label for="fileInput" class="file-input-label">
                    📁 Selecionar Imagem da Assinatura
                </label>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <div id="fileName" style="text-align: center; margin-top: 10px;"></div>
            <div id="imagePreviewContainer" style="display: none;">
                <img id="imagePreview" class="image-preview" alt="Preview da imagem">
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <button class="btn btn-warning hidden" onclick="removeBackground()" id="removeBgBtn">
                    ✨ Remover Fundo da Imagem
                </button>
            </div>
        </div>

        <div class="form-group">
            <label for="doctorName">Nome do Médico (com Dr./Dra.):</label>
            <input type="text" id="doctorName" placeholder="Ex: Dr. João Silva">
        </div>

        <div class="form-group">
            <label for="doctorCRM">CRM com Estado:</label>
            <input type="text" id="doctorCRM" placeholder="Ex: CRM 12345/SP">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="removeFilters">
            <label for="removeFilters" style="margin-bottom: 0;">Usar assinatura original (sem filtros)</label>
        </div>
        <div class="helper-text" style="margin-bottom: 20px;">
            💡 Quando marcado, mantém as cores originais da assinatura sem aplicar filtro preto/branco
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="addExtraPhrase">
            <label for="addExtraPhrase" style="margin-bottom: 0;">Adicionar frases extras</label>
        </div>

        <div class="form-group hidden" id="extraPhraseGroup">
            <label for="extraPhrase">Frase adicional 1:</label>
            <textarea id="extraPhrase" placeholder="Digite a primeira frase extra (pressione Enter para quebrar linha)" rows="2"></textarea>
            <div class="helper-text">💡 Pressione Enter para adicionar quebras de linha</div>
        </div>

        <div class="form-group hidden" id="extraPhrase2Group">
            <label for="extraPhrase2">Frase adicional 2 (opcional):</label>
            <textarea id="extraPhrase2" placeholder="Digite a segunda frase extra (opcional)" rows="2"></textarea>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px;" id="loadingText">Processando imagem...</p>
        </div>

        <div id="messageContainer"></div>

        <div class="buttons-container">
            <button class="btn btn-primary" onclick="generateSignature()" id="generateBtn">
                ✨ Gerar Assinatura
            </button>
            <button class="btn btn-success hidden" onclick="downloadImage()" id="downloadBtn">
                💾 Baixar Assinatura
            </button>
        </div>

        <div class="preview-section">
            <canvas id="previewCanvas" width="480" height="120"></canvas>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
